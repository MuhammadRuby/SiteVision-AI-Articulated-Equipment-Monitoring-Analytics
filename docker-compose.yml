services:
  zookeeper:
    image: zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - construction-net

  kafka:
    image: apache/kafka:latest
    depends_on:
      - zookeeper
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    networks:
      - construction-net

  timescaledb:
    image: timescale/timescaledb:latest-pg17
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=construction_db
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    networks:
      - construction-net

  cv_service:
    image: muhammadruby/cv-service:latest 
    
  backend_service:
    image: muhammadruby/backend-service:latest
    
  ui_service:
    image: muhammadruby/ui-dashboard:latest

networks:
  construction-net:
    driver: bridge