name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ] # هيشتغل أول ما ترفع كود على فرع main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # سيرفر قوي من جيتهب بمساحة كبيرة
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 1. بناء ورفع خدمة الـ AI (الأثقل)
      - name: Build and Push CV Service
        uses: docker/build-push-action@v4
        with:
          context: ./cv_service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cv-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. بناء ورفع خدمة الـ Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend_service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend-service:latest

      # 3. بناء ورفع خدمة الـ UI
      - name: Build and Push UI
        uses: docker/build-push-action@v4
        with:
          context: ./ui_service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ui-dashboard:latest